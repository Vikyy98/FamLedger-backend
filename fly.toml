# Fly.io app configuration for FamLedger API.
# Docs: https://fly.io/docs/reference/configuration/

app = "famledger-api"
primary_region = "bom"       # Mumbai — closest to Supabase ap-south-1

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret config only. Secrets (DB conn, JWT key, CORS origins) come from
  # `fly secrets set` and appear as env vars at runtime.
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port = 8080
  force_https = true
  # Stop the machine when idle. First request after idle takes ~2s to cold
  # start, which is fine for a personal MVP and keeps monthly cost near $0.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
